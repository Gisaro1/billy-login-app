<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center bg-gray-950 font-sans min-h-screen">
    <div class="bg-gray-500 p-8 rounded-xl shadow-lg w-96">
        <div class="hidden bg-red-500 text-white p-3 rounded-lg mb-4 flex justify-between items-center" id="errorContainer">
            <span id="error-message"></span>
            <button onclick="hideError()" class="font-bold text-white ml-4">Hide error</button>
        </div>
        <form onsubmit="loginHandler(event)" class="flex flex-col gap-4">
            <input type="text" placeholder="username" id="username" class="bg-gray-700 text-white p-3 rounded-lg outline-none focus:ring-green-500">
            <input type="password" placeholder="passcode" id="passcode" class="bg-blue-800 text-white font-bold p-3 rounded-lg hover:bg-blue-900">
            <button type="submit">Login</button>
        </form>
    </div>
    <script src="login.js">
    </script>
</body>
</html>
